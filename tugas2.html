<!DOCTYPE html>
<html>
<head>
<title>Tugas 2 - Formulir</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to bottom, #1e3c72, #2a5298, #6c757d);
    color: white;
}

nav {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: rgba(0,0,0,0.3);
}

.container {
    padding: 20px;
}

form {
    background: rgba(255,255,255,0.15);
    padding: 20px;
    border-radius: 15px;
    max-width: 500px;
    margin: auto;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    background: white;
    color: #1e3c72;
    border: none;
    border-radius: 10px;
    font-weight: bold;
}

button:hover {
    background: gold;
}
</style>
</head>

<body>

<nav>
<h3>🌊 Tiaraisya Akbar</h3>
<a href="index.html">Home</a>
</nav>

<div class="container">
<h2 align="center">📗 Formulir Data</h2>

<form>

<h3>Data Demografi</h3>
<input type="text" placeholder="Nama">
<input type="date">
<input type="text" placeholder="Alamat">
<input type="text" placeholder="No Telepon">
<input type="email" placeholder="Email">

<select>
<option>Pendidikan</option>
<option>SMA</option>
<option>D3</option>
<option>S1</option>
<option>S2</option>
<option>S3</option>
</select>

<h3>Data Bank</h3>
<select>
<option>Nama Bank</option>
<option>BRI</option>
<option>BNI</option>
<option>Mandiri</option>
<option>BTN</option>
<option>BSI</option>
<option>BCA</option>
</select>

<input type="text" placeholder="Nomor Rekening">

<h3>Data Transaksi</h3>
<input type="date">
<input type="text" placeholder="Uraian Transaksi">

<select>
<option>Jenis Transaksi</option>
<option>Debit</option>
<option>Kredit</option>
</select>

<input type="number" placeholder="Jumlah">

<button type="submit">Kirim</button>

</form>
</div>

</body>
</html>
