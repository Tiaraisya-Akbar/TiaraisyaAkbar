<!DOCTYPE html>
<html>
<head>
<title>Tugas 2 - Formulir</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(to bottom,#1e3c72,#2a5298,#6c757d);
    color:white;
    min-height:100vh;
}

/* HEADER */

header{
    text-align:center;
    padding:40px 20px;
    background:rgba(0,0,0,0.2);
}

header h1{
    font-size:38px;
    margin-bottom:10px;
}

header h2{
    color:#ffd700;
    margin-bottom:10px;
}

header p{
    opacity:.9;
}

/* KEMBALI */

.back-btn{
    display:inline-block;
    margin-top:15px;
    padding:10px 20px;
    background:white;
    color:#1e3c72;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    transition:.3s;
}

.back-btn:hover{
    background:#ffd700;
    color:black;
}

/* CONTAINER */

.container{
    display:flex;
    justify-content:center;
    padding:30px;
}

/* CARD */

.card{
    width:100%;
    max-width:700px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:35px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

.card h2{
    text-align:center;
    color:#ffd700;
    margin-bottom:15px;
}

.desc{
    text-align:center;
    margin-bottom:25px;
    line-height:1.8;
}

/* FORM */

form h3{
    color:#ffe082;
    margin:20px 0 10px;
}

input,
select{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    font-size:15px;
}

input:focus,
select:focus{
    outline:none;
}

/* BUTTON */

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    border:none;
    border-radius:12px;
    background:#ffd700;
    color:#1e3c72;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:white;
    transform:translateY(-3px);
}

/* FOOTER */

footer{
    text-align:center;
    padding:20px;
    background:rgba(0,0,0,0.25);
    margin-top:30px;
}

/* RESPONSIVE */

@media(max-width:768px){

    header h1{
        font-size:28px;
    }

    header h2{
        font-size:20px;
    }

    .card{
        padding:20px;
    }

}
    
</style>
</head>

<body>

<header>

    <h1>📗 TUGAS 2</h1>
    <h2>Formulir Data Demografi</h2>
    <p>Sistem Informasi Manajemen Perikanan</p>

    <a href="index.html" class="back-btn">
        ← Kembali
    </a>

</header>

<div class="container">

    <div class="card">

        <h2>📝 Formulir Data</h2>

        <p class="desc">
            Silakan lengkapi data demografi, data bank,
            dan data transaksi pada formulir berikut.
        </p>

        <form>

            <h3>👤 Data Demografi</h3>

            <input type="text" placeholder="Nama Lengkap">
            <input type="date">
            <input type="text" placeholder="Alamat">
            <input type="text" placeholder="Nomor Telepon">
            <input type="email" placeholder="Email">

            <select>
                <option>Pendidikan Terakhir</option>
                <option>SMA</option>
                <option>D3</option>
                <option>S1</option>
                <option>S2</option>
                <option>S3</option>
            </select>

            <h3>🏦 Data Bank</h3>

            <select>
                <option>Nama Bank</option>
                <option>BRI</option>
                <option>BNI</option>
                <option>Mandiri</option>
                <option>BTN</option>
                <option>BSI</option>
                <option>BCA</option>
            </select>

            <input type="text" placeholder="Nomor Rekening">

            <h3>💰 Data Transaksi</h3>

            <input type="date">
            <input type="text" placeholder="Uraian Transaksi">

            <select>
                <option>Jenis Transaksi</option>
                <option>Debit</option>
                <option>Kredit</option>
            </select>

            <input type="number" placeholder="Jumlah Transaksi">

            <button type="submit">
                Kirim Data
            </button>

        </form>

    </div>

</div>

<footer>
    Tiaraisya Akbar
</footer>

</body>
