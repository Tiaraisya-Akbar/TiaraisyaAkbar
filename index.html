<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            overflow: hidden;
        }

        /* LOADING */
        #loading {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #1e3c72, #2a5298, #6c757d);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* HALAMAN UTAMA */
        #content {
            display: none;
            height: 100vh;
            background: linear-gradient(to bottom, #1e3c72, #2a5298, #6c757d);
            color: white;
            text-align: center;
            justify-content: center;
            align-items: center;
            display: flex;
            flex-direction: column;
        }

        .box {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
        }

        .menu a {
            display: block;
            margin: 10px auto;
            width: 200px;
            padding: 12px;
            background: white;
            color: #1e3c72;
            border-radius: 10px;
            text-decoration: none;
        }

        .menu a:hover {
            background: #ccc;
        }

        /* OMBak HALUS */
        .wave {
            position: absolute;
            bottom: 0;
            width: 150%;
            height: 100px;
            background: url('https://i.ibb.co/wQZVxxk/wave.png');
            background-size: cover;
            animation: wave 25s linear infinite;
            opacity: 0.4;
        }

        @keyframes wave {
            from {transform: translateX(0);}
            to {transform: translateX(-50%);}
        }

    </style>

</head>
<body>

<!-- LOADING -->
<div id="loading">
    <h1>🌊 Loading... ⭐</h1>
</div>

<!-- CONTENT -->
<div id="content">
    <div class="box">
        <h1>🌊 Tiaraisya Akbar ⭐</h1>
        <p>Sistem Informasi Manajemen Perikanan</p>

        <div class="menu">
            <a href="tugas1.html">📘 Tugas 1</a>
            <a href="tugas2.html">📗 Tugas 2</a>
        </div>

        <br>
        <button onclick="playSound()">🌬️ Suara Pantai</button>
    </div>
</div>

<!-- OMBak -->
<div class="wave"></div>

<!-- AUDIO -->
<audio id="sound">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b1c0d7d2.mp3" type="audio/mp3">
</audio>

<!-- SCRIPT -->
<script>
    // LOADING LEBIH CEPAT (1 detik)
    setTimeout(function() {
        document.getElementById("loading").style.display = "none";
        document.getElementById("content").style.display = "flex";
    }, 1000);

    function playSound() {
        document.getElementById("sound").play();
    }
</script>

</body>
</html>
