<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>

    <!-- WAJIB UNTUK HP -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            color: white;
            overflow-x: hidden;
        }

        /* BACKGROUND */
        .background {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #1e3c72, #2a5298, #6c757d);
            z-index: -1;
        }

        /* OMBak */
        .wave {
            position: absolute;
            bottom: 0;
            width: 150%;
            height: 120px;
            background: url('https://i.ibb.co/wQZVxxk/wave.png');
            background-size: cover;
            animation: wave 25s linear infinite;
            opacity: 0.5;
        }

        .wave2 {
            animation: wave 35s linear infinite reverse;
            opacity: 0.3;
        }

        @keyframes wave {
            from {transform: translateX(0);}
            to {transform: translateX(-50%);}
        }

        /* CONTAINER */
        .container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        /* BOX */
        .box {
            background: rgba(255,255,255,0.15);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 400px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        p {
            font-size: 16px;
        }

        /* MENU */
        .menu a {
            display: block;
            margin: 10px auto;
            width: 100%;
            max-width: 250px;
            padding: 12px;
            background: white;
            color: #1e3c72;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .menu a:hover {
            background: gold;
            transform: scale(1.05);
        }

        /* BUTTON */
        button {
            margin-top: 10px;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }

    </style>
</head>

<body>

<!-- BACKGROUND -->
<div class="background"></div>

<!-- OMBak -->
<div class="wave"></div>
<div class="wave wave2"></div>

<!-- KONTEN -->
<div class="container">
    <div class="box">
        <h1>🌊 Tiaraisya Akbar ⭐</h1>
        <p>Sistem Informasi Manajemen Perikanan</p>

        <div class="menu">
            <a href="tugas1.html">📘 Tugas 1</a>
            <a href="tugas2.html">📗 Tugas 2</a>
        </div>

        <button onclick="playSound()">🌬️ Suara Pantai</button>
    </div>
</div>

<!-- AUDIO -->
<audio id="sound">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b1c0d7d2.mp3" type="audio/mp3">
</audio>

<!-- SCRIPT -->
<script>
function playSound() {
    document.getElementById("sound").play();
}
</script>

</body>
</html>
