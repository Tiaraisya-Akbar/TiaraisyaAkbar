<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>

    <!-- AGAR RESPONSIVE DI HP -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            overflow: hidden;
        }

        /* LOADING SCREEN */
        #loading {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #1e3c72, #2a5298, #6c757d);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 999;
        }

        #loading h1 {
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% {opacity: 1;}
            50% {opacity: 0.3;}
            100% {opacity: 1;}
        }

        /* HALAMAN UTAMA */
        #content {
            display: none;
            height: 100vh;
            background: linear-gradient(to bottom, #1e3c72, #2a5298, #6c757d);
            color: white;
            text-align: center;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            display: flex;
            animation: fadeIn 1s;
            position: relative;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        .box {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            z-index: 2;
        }

        h1 {
            font-size: 32px;
        }

        p {
            font-size: 16px;
        }

        .menu a {
            display: block;
            margin: 10px auto;
            width: 200px;
            padding: 12px;
            background: white;
            color: #1e3c72;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .menu a:hover {
            background: gold;
            color: black;
            transform: scale(1.1);
        }

        /* ⭐ BINTANG */
        .star {
            position: absolute;
            color: white;
            animation: float 8s linear infinite;
            opacity: 0.8;
        }

        @keyframes float {
            from {transform: translateY(100vh);}
            to {transform: translateY(-10vh);}
        }

    </style>

</head>
<body>

<!-- LOADING -->
<div id="loading">
    <h1>🌊 Loading... ⭐</h1>
    <p>Menyiapkan halaman...</p>
</div>

<!-- CONTENT -->
<div id="content">
    <div class="box">
        <h1>🌊 Tiaraisya Akbar ⭐</h1>
        <p>✨ Sistem Informasi Manajemen Perikanan ✨</p>

        <div class="menu">
            <a href="tugas1.html">📘 Tugas 1</a>
            <a href="tugas2.html">📗 Tugas 2</a>
        </div>
    </div>
</div>

<!-- SCRIPT -->
<script>
    // LOADING 1 DETIK
    setTimeout(function() {
        document.getElementById("loading").style.display = "none";
        document.getElementById("content").style.display = "flex";
    }, 1000);

    // BINTANG BERGERAK
    setInterval(() => {
        let star = document.createElement("div");
        star.className = "star";
        star.innerHTML = "⭐";

        star.style.left = Math.random() * window.innerWidth + "px";
        star.style.fontSize = (10 + Math.random() * 20) + "px";

        document.body.appendChild(star);

        setTimeout(() => {
            star.remove();
        }, 8000);
    }, 800);
</script>

</body>
</html>
