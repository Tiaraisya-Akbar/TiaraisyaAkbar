<!DOCTYPE html>
<html>
<head>
    <title>Tugas 4</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
       *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(to bottom,#1e3c72,#2a5298,#6c757d);
    color:white;
    min-height:100vh;
}

/* HEADER */

header{
    text-align:center;
    padding:40px 20px;
    background:rgba(0,0,0,0.2);
}

header h1{
    font-size:38px;
    margin-bottom:10px;
}

header h2{
    color:#ffd700;
    margin-bottom:10px;
}

header p{
    opacity:.9;
}

/* BUTTON KEMBALI */

.back-btn{
    display:inline-block;
    margin-top:15px;
    padding:10px 20px;
    background:white;
    color:#1e3c72;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    transition:.3s;
}

.back-btn:hover{
    background:#ffd700;
    color:black;
}

/* CONTAINER */

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

/* CARD */

.card{
    width:100%;
    max-width:700px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:35px;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

.card h2{
    color:#ffd700;
    margin-bottom:15px;
}

.desc{
    line-height:1.8;
    margin-bottom:30px;
}

/* TOMBOL FORM */

.btn-form{
    display:inline-block;
    padding:15px 30px;
    background:#ffd700;
    color:#1e3c72;
    text-decoration:none;
    border-radius:12px;
    font-weight:bold;
    font-size:18px;
    transition:.3s;
}

.btn-form:hover{
    background:white;
    transform:translateY(-3px);
}

/* FOOTER */

footer{
    text-align:center;
    padding:20px;
    background:rgba(0,0,0,0.25);
    margin-top:30px;
}

@media(max-width:768px){

    header h1{
        font-size:28px;
    }

    header h2{
        font-size:20px;
    }

    .card{
        padding:20px;
    }

}
    </style>
</head>

<body>

<header>

    <h1>📕 TUGAS 4</h1>
    <h2>GOOGLE FORM</h2>
    <p>Sistem Informasi Manajemen Perikanan</p>

    <a href="index.html" class="back-btn">
        ← Kembali
    </a>

</header>

<div class="form-container">

    <iframe
    src="https://docs.google.com/forms/d/e/1FAIpQLSdxEG8HNlIlOfKIKOWZwdE5Kr0yrQITk1dMG7HitlwYcXw8Aw/viewform?embedded=true"
    width="100%"
    height="900"
    frameborder="0"
    marginheight="0"
    marginwidth="0">

    Memuat…

    </iframe>

</div>

    </div>

</div>

<footer>
    Tiaraisya Akbar
</footer>

</body>
