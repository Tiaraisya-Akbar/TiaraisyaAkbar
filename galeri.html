<!DOCTYPE html>
<html>
<head>
    <title>Galeri</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to bottom, #4facfe, #00c6ff);
            color: white;
        }

        .galeri {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px;
        }

        .galeri img {
            width: 200px;
            margin: 10px;
            border-radius: 15px;
            transition: 0.3s;
        }

        .galeri img:hover {
            transform: scale(1.1);
        }
    </style>

</head>
<body>

<h1>Galeri Rumah</h1>

<div class="galeri">
    <img src="rumah_sampingkanan.jpg">
    <img src="rumah_ruangtamu.jpg">
    <img src="rumah_kamar.jpg">
    <img src="rumah_dapur.jpg">
</div>

<br>
<a href="index.html" style="color:white;">Kembali</a>

</body>
</html>
