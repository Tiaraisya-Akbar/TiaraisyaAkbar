<!DOCTYPE html>
<html>
<head>
<title>Galeri</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to bottom, #1e3c72, #2a5298, #6c757d);
    color: white;
    animation: fadeIn 0.8s;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

nav {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: rgba(0,0,0,0.3);
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap: 10px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
}
</style>
</head>

<body>

<nav>

</body>
</html>
