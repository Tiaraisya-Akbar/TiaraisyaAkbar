<!DOCTYPE html>
<html>
<head>
    <title>Sajian Data 2</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body{
            margin:0;
            font-family: Arial;
            background: linear-gradient(to bottom, #1e3c72, #2a5298, #6c757d);
            color:white;
        }

        /* NAVBAR */
        nav{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px;
            background: rgba(0,0,0,0.3);
        }

        nav a{
            color:white;
            text-decoration:none;
            font-weight:bold;
        }

        /* JUDUL */
        h1{
            text-align:center;
            margin-top:20px;
        }

        p{
            text-align:center;
        }

        /* CONTAINER */
        .container{
            width:95%;
            margin:auto;
            margin-top:20px;
        }

        /* BOX */
        .box{
            background: rgba(255,255,255,0.1);
            padding:20px;
            border-radius:20px;
            margin-bottom:30px;
            backdrop-filter: blur(10px);
            text-align:center;
        }

        /* BUTTON */
        .btn{
            display:inline-block;
            margin-top:15px;
            padding:12px 20px;
            background:white;
            color:#1e3c72;
            text-decoration:none;
            border-radius:10px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            background:gold;
            color:black;
            transform:scale(1.05);
        }

        /* IFRAME SPREADSHEET */
        iframe{
            width:100%;
            height:500px;
            border:none;
            border-radius:15px;
            background:white;
            margin-top:15px;
        }

        @media(max-width:768px){
            iframe{
                height:400px;
            }
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <h3>🌊 Tiaraisya Akbar</h3>
    <a href="index.html">Home</a>
</nav>

<!-- JUDUL -->
<h1>📊 Sajian Data 2</h1>
<p>Dashboard dan Analisis PIECES</p>

<div class="container">

    <!-- DASHBOARD -->
    <div class="box">

        <h2>📈 Dashboard Data</h2>

        <p>
            Klik tombol di bawah untuk membuka dashboard data.
        </p>

        <a class="btn"
        href="https://datastudio.google.com/embed/reporting/edd676c7-aaad-4db3-916a-1117b7a0905e/page/page_12345"
        target="_blank">

        📊 Buka Dashboard

        </a>

    </div>

    <!-- SPREADSHEET -->
    <div class="box">

        <h2>📄 Analisis PIECES</h2>

        <iframe
        src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTZVcsEBw8GbIwBPhGFhL2tUB_oEktCk-Ef45X83F-6ogbBKpIZQnpRwVq3J2P0RO5M13dkUlWOSIWl/pubhtml?gid=873888619&amp;single=true&amp;widget=true&amp;headers=false">
        </iframe>

    </div>

</div>

</body>
</html>
